##############################################################################
#                        CRS Compose Configuration                           #
#          Example for crs-multi-retrieval (bug-fixing)                      #
##############################################################################

# --- General Settings -------------------------------------------------------
run_env: local
docker_registry: local

# --- Infrastructure ---------------------------------------------------------
oss_crs_infra:
  cpuset: "0-1"
  memory: "8G"

# --- CRS (crs-multi-retrieval) ---------------------------------------------
# Builder sidecars are declared in crs.yaml (snapshot: true / run_snapshot: true)
# and handled automatically by the framework — no separate entry needed.
crs-multi-retrieval:
  cpuset: "2-7"
  memory: "16G"
  llm_budget: 10
  additional_env:
    CRS_AGENT: multi_retrieval
    MULTI_RETRIEVAL_MODEL: o4-mini
    # MULTI_RETRIEVAL_BACKUP_MODEL: gemini-2.5-pro

# --- LLM Configuration -----------------------------------------------------
llm_config:
  litellm:
    mode: internal
    internal:
      config_path: ./example/crs-multi-retrieval/litellm-config.yaml
