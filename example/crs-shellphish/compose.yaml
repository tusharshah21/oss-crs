##############################################################################
#                        CRS Compose Configuration                           #
#                    Shellphish CRS (bug-finding)                            #
##############################################################################

# --- General Settings -------------------------------------------------------
run_env: local
docker_registry: local

# --- Infrastructure ---------------------------------------------------------
oss_crs_infra:
  cpuset: "0-3"
  memory: "16G"

# --- CRS (Shellphish) ------------------------------------------------------
# Shellphish CRS with AFL++ v4.30c and modified LibFuzzer in parallel.
# Use oss_crs_scheduler.py to set core allocation (AFLPP_CPUS, LIBFUZZER_CPUS).
#
# With registry (auto-clones from GitHub):
#   crs-shellphish:
#     cpuset: "4-15"
#     memory: "48G"
#
# With local path (for development):
crs-shellphish:
  source:
    local_path: /project/shellphish-oss-crs
  cpuset: "4-15"
  memory: "48G"
