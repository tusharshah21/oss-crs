##############################################################################
#                        CRS Compose Configuration                           #
#       Shellphish Grammar (LLM-driven grammar fuzzing with AFL++)           #
##############################################################################

# --- General Settings -------------------------------------------------------
run_env: local
docker_registry: local

# --- Infrastructure ---------------------------------------------------------
oss_crs_infra:
  cpuset: "0-1"
  memory: "8G"

# --- LLM Configuration -----------------------------------------------------
# External litellm server. Set AIXCC_LITELLM_HOSTNAME and LITELLM_KEY
# environment variables before running (source your .env file).
llm_config:
  litellm:
    mode: external
    model_check: false
    external:
      url_env: AIXCC_LITELLM_HOSTNAME
      key_env: LITELLM_KEY

# --- CRS (Shellphish Grammar) ----------------------------------------------
# Pipeline: AFL++ fuzzer + coverage tracer + Grammar-Guy (LLM grammar gen)
# + GrammarRoomba (grammar refinement).
crs-shellphish-grammar:
  source:
    local_path: /project/shellphish-oss-crs
  cpuset: "2-7"
  memory: "24G"
  llm_budget: 10
