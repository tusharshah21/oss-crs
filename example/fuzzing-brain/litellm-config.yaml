model_list:
  # Gemini (primary — set GEMINI_API_KEY)
  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  # OpenAI (set OPENAI_API_KEY, or leave as Gemini aliases below)
  # - model_name: gpt-4o
  #   litellm_params:
  #     model: openai/gpt-4o
  #     api_key: os.environ/OPENAI_API_KEY

  # - model_name: o3
  #   litellm_params:
  #     model: openai/o3
  #     api_key: os.environ/OPENAI_API_KEY

  # Anthropic (set ANTHROPIC_API_KEY, or leave as Gemini aliases below)
  # - model_name: claude-sonnet-4-6
  #   litellm_params:
  #     model: anthropic/claude-sonnet-4-6
  #     api_key: os.environ/ANTHROPIC_API_KEY

  # Model aliases — route all models through Gemini when only GEMINI_API_KEY is set.
  # Remove these and uncomment above when you have the real API keys.
  - model_name: claude-opus-4-6
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gpt-4o
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gpt-4.1
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  - model_name: o3
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY
