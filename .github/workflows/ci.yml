name: CI

on:
  pull_request:
    branches:
      - main

env:
  RUFF_PATHS: oss_crs oss-crs-infra libCRS
  PYRIGHT_PATHS: oss_crs/src libCRS/libCRS oss-crs-infra

jobs:
  lint:
    name: Lint (ruff check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv run ruff check $RUFF_PATHS

  format:
    name: Format check (ruff format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv run ruff format --check $RUFF_PATHS

  typecheck:
    name: Type check (pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --frozen --dev
      - run: uv run pyright $PYRIGHT_PATHS

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --frozen --dev
      - run: uv run pytest -m "not integration and not docker" -v

  smoke-c:
    name: Smoke test (C)
    runs-on: ubuntu-latest
    needs: [lint, format, typecheck, test]
    timeout-minutes: 30
    env:
      EXTERNAL_LITELLM_API_BASE: ${{ secrets.EXTERNAL_LITELLM_API_BASE }}
      EXTERNAL_LITELLM_API_KEY: ${{ secrets.EXTERNAL_LITELLM_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --frozen --dev

      - name: Create CI compose (bugfinding)
        run: |
          mkdir -p /tmp/ci-config
          cat > /tmp/ci-config/compose-libfuzzer.yaml << 'EOF'
          run_env: local
          docker_registry: local
          oss_crs_infra:
            cpuset: "0"
            memory: "4G"
          crs-libfuzzer:
            cpuset: "1-3"
            memory: "10G"
          EOF

      - name: Create CI compose (bugfixing)
        run: |
          cat > /tmp/ci-config/compose-claude.yaml << 'EOF'
          run_env: local
          docker_registry: local
          oss_crs_infra:
            cpuset: "0"
            memory: "4G"
          crs-claude-code:
            cpuset: "1-3"
            memory: "10G"
            llm_budget: 5
            additional_env:
              CRS_AGENT: claude_code
              ANTHROPIC_MODEL: claude-sonnet-4-20250514
          llm_config:
            litellm:
              mode: internal
              internal:
                config_path: /tmp/ci-config/litellm.yaml
          EOF

      - name: Create CI litellm config
        run: |
          cat > /tmp/ci-config/litellm.yaml << 'EOF'
          model_list:
            - model_name: claude-sonnet-4-20250514
              litellm_params:
                model: anthropic/claude-sonnet-4-20250514
                api_base: os.environ/EXTERNAL_LITELLM_API_BASE
                api_key: os.environ/EXTERNAL_LITELLM_API_KEY
            - model_name: claude-haiku-4-5-20251001
              litellm_params:
                model: anthropic/claude-haiku-4-5-20251001
                api_base: os.environ/EXTERNAL_LITELLM_API_BASE
                api_key: os.environ/EXTERNAL_LITELLM_API_KEY
            - model_name: claude-opus-4-6
              litellm_params:
                model: anthropic/claude-opus-4-6
                api_base: os.environ/EXTERNAL_LITELLM_API_BASE
                api_key: os.environ/EXTERNAL_LITELLM_API_KEY
            - model_name: claude-sonnet-4-6
              litellm_params:
                model: anthropic/claude-sonnet-4-6
                api_base: os.environ/EXTERNAL_LITELLM_API_BASE
                api_key: os.environ/EXTERNAL_LITELLM_API_KEY
          EOF

      - name: Setup mock-c repo as git
        run: |
          cd oss_crs/tests/integration/fixtures/mock-c-repo
          git init
          git config user.email "ci@test.com"
          git config user.name "CI"
          git add .
          git commit -m "initial"

      - name: Build mock-c target
        run: |
          uv run oss-crs build-target \
            --compose-file /tmp/ci-config/compose-libfuzzer.yaml \
            --work-dir /tmp/oss-crs-work \
            --fuzz-proj-path oss_crs/tests/integration/fixtures/mock-c-project \
            --target-source-path oss_crs/tests/integration/fixtures/mock-c-repo \
            --build-id smoke-c

      - name: Bugfinding (crs-libfuzzer)
        run: |
          uv run oss-crs run \
            --compose-file /tmp/ci-config/compose-libfuzzer.yaml \
            --work-dir /tmp/oss-crs-work \
            --fuzz-proj-path oss_crs/tests/integration/fixtures/mock-c-project \
            --target-source-path oss_crs/tests/integration/fixtures/mock-c-repo \
            --target-harness fuzz_parse_buffer \
            --timeout 600 \
            --build-id smoke-c \
            --run-id bugfinding-c \
            --early-exit

      - name: Verify POVs found
        run: |
          artifacts=$(uv run oss-crs artifacts \
            --compose-file /tmp/ci-config/compose-libfuzzer.yaml \
            --work-dir /tmp/oss-crs-work \
            --fuzz-proj-path oss_crs/tests/integration/fixtures/mock-c-project \
            --target-source-path oss_crs/tests/integration/fixtures/mock-c-repo \
            --target-harness fuzz_parse_buffer \
            --build-id smoke-c \
            --run-id bugfinding-c)
          echo "$artifacts" | jq .
          pov_dir=$(echo "$artifacts" | jq -r '.crs | to_entries[0].value.pov')
          echo "POV directory: $pov_dir"
          if [ ! -d "$pov_dir" ] || [ -z "$(ls -A "$pov_dir")" ]; then
            echo "ERROR: No POVs found"
            exit 1
          fi
          echo "POV_DIR=$pov_dir" >> $GITHUB_ENV
          echo "Found POVs:"
          ls -la "$pov_dir"

      - name: Bugfixing (crs-claude-code)
        run: |
          uv run oss-crs run \
            --compose-file /tmp/ci-config/compose-claude.yaml \
            --work-dir /tmp/oss-crs-work \
            --fuzz-proj-path oss_crs/tests/integration/fixtures/mock-c-project \
            --target-source-path oss_crs/tests/integration/fixtures/mock-c-repo \
            --target-harness fuzz_parse_buffer \
            --timeout 600 \
            --build-id smoke-c \
            --run-id bugfixing-c \
            --pov-dir "$POV_DIR" \
            --early-exit

      - name: Verify patches found
        run: |
          artifacts=$(uv run oss-crs artifacts \
            --compose-file /tmp/ci-config/compose-claude.yaml \
            --work-dir /tmp/oss-crs-work \
            --fuzz-proj-path oss_crs/tests/integration/fixtures/mock-c-project \
            --target-source-path oss_crs/tests/integration/fixtures/mock-c-repo \
            --target-harness fuzz_parse_buffer \
            --build-id smoke-c \
            --run-id bugfixing-c)
          echo "$artifacts" | jq .
          patch_dir=$(echo "$artifacts" | jq -r '.crs | to_entries[0].value.patch // empty')
          if [ -n "$patch_dir" ] && [ -d "$patch_dir" ] && [ -n "$(ls -A "$patch_dir" 2>/dev/null)" ]; then
            echo "Found patches:"
            ls -la "$patch_dir"
          else
            echo "WARNING: No patches found (may be expected if LLM could not fix)"
          fi

  smoke-java:
    name: Smoke test (Java)
    runs-on: ubuntu-latest
    needs: [lint, format, typecheck, test]
    timeout-minutes: 30
    env:
      EXTERNAL_LITELLM_API_BASE: ${{ secrets.EXTERNAL_LITELLM_API_BASE }}
      EXTERNAL_LITELLM_API_KEY: ${{ secrets.EXTERNAL_LITELLM_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --frozen --dev

      - name: Create CI compose (bugfinding - jazzer)
        run: |
          mkdir -p /tmp/ci-config
          cat > /tmp/ci-config/compose-jazzer.yaml << 'EOF'
          run_env: local
          docker_registry: local
          oss_crs_infra:
            cpuset: "0"
            memory: "4G"
          crs-jazzer:
            cpuset: "1-3"
            memory: "10G"
          EOF

      - name: Create CI compose (bugfixing)
        run: |
          cat > /tmp/ci-config/compose-claude.yaml << 'EOF'
          run_env: local
          docker_registry: local
          oss_crs_infra:
            cpuset: "0"
            memory: "4G"
          crs-claude-code:
            cpuset: "1-3"
            memory: "10G"
            llm_budget: 5
            additional_env:
              CRS_AGENT: claude_code
              ANTHROPIC_MODEL: claude-sonnet-4-20250514
          llm_config:
            litellm:
              mode: internal
              internal:
                config_path: /tmp/ci-config/litellm.yaml
          EOF

      - name: Create CI litellm config
        run: |
          cat > /tmp/ci-config/litellm.yaml << 'EOF'
          model_list:
            - model_name: claude-sonnet-4-20250514
              litellm_params:
                model: anthropic/claude-sonnet-4-20250514
                api_base: os.environ/EXTERNAL_LITELLM_API_BASE
                api_key: os.environ/EXTERNAL_LITELLM_API_KEY
            - model_name: claude-haiku-4-5-20251001
              litellm_params:
                model: anthropic/claude-haiku-4-5-20251001
                api_base: os.environ/EXTERNAL_LITELLM_API_BASE
                api_key: os.environ/EXTERNAL_LITELLM_API_KEY
            - model_name: claude-opus-4-6
              litellm_params:
                model: anthropic/claude-opus-4-6
                api_base: os.environ/EXTERNAL_LITELLM_API_BASE
                api_key: os.environ/EXTERNAL_LITELLM_API_KEY
            - model_name: claude-sonnet-4-6
              litellm_params:
                model: anthropic/claude-sonnet-4-6
                api_base: os.environ/EXTERNAL_LITELLM_API_BASE
                api_key: os.environ/EXTERNAL_LITELLM_API_KEY
          EOF

      - name: Setup mock-java repo as git
        run: |
          cd oss_crs/tests/integration/fixtures/mock-java-repo
          git init
          git config user.email "ci@test.com"
          git config user.name "CI"
          git add .
          git commit -m "initial"

      - name: Build mock-java target
        run: |
          uv run oss-crs build-target \
            --compose-file /tmp/ci-config/compose-jazzer.yaml \
            --work-dir /tmp/oss-crs-work \
            --fuzz-proj-path oss_crs/tests/integration/fixtures/mock-java-project \
            --target-source-path oss_crs/tests/integration/fixtures/mock-java-repo \
            --build-id smoke-java

      - name: Bugfinding (crs-jazzer)
        run: |
          uv run oss-crs run \
            --compose-file /tmp/ci-config/compose-jazzer.yaml \
            --work-dir /tmp/oss-crs-work \
            --fuzz-proj-path oss_crs/tests/integration/fixtures/mock-java-project \
            --target-source-path oss_crs/tests/integration/fixtures/mock-java-repo \
            --target-harness OssFuzz1 \
            --timeout 600 \
            --build-id smoke-java \
            --run-id bugfinding-java \
            --early-exit

      - name: Verify POVs found
        run: |
          artifacts=$(uv run oss-crs artifacts \
            --compose-file /tmp/ci-config/compose-jazzer.yaml \
            --work-dir /tmp/oss-crs-work \
            --fuzz-proj-path oss_crs/tests/integration/fixtures/mock-java-project \
            --target-source-path oss_crs/tests/integration/fixtures/mock-java-repo \
            --target-harness OssFuzz1 \
            --build-id smoke-java \
            --run-id bugfinding-java)
          echo "$artifacts" | jq .
          pov_dir=$(echo "$artifacts" | jq -r '.crs | to_entries[0].value.pov')
          echo "POV directory: $pov_dir"
          if [ ! -d "$pov_dir" ] || [ -z "$(ls -A "$pov_dir")" ]; then
            echo "ERROR: No POVs found"
            exit 1
          fi
          echo "POV_DIR=$pov_dir" >> $GITHUB_ENV
          echo "Found POVs:"
          ls -la "$pov_dir"

      - name: Bugfixing (crs-claude-code)
        run: |
          uv run oss-crs run \
            --compose-file /tmp/ci-config/compose-claude.yaml \
            --work-dir /tmp/oss-crs-work \
            --fuzz-proj-path oss_crs/tests/integration/fixtures/mock-java-project \
            --target-source-path oss_crs/tests/integration/fixtures/mock-java-repo \
            --target-harness OssFuzz1 \
            --timeout 600 \
            --build-id smoke-java \
            --run-id bugfixing-java \
            --pov-dir "$POV_DIR" \
            --early-exit

      - name: Verify patches found
        run: |
          artifacts=$(uv run oss-crs artifacts \
            --compose-file /tmp/ci-config/compose-claude.yaml \
            --work-dir /tmp/oss-crs-work \
            --fuzz-proj-path oss_crs/tests/integration/fixtures/mock-java-project \
            --target-source-path oss_crs/tests/integration/fixtures/mock-java-repo \
            --target-harness OssFuzz1 \
            --build-id smoke-java \
            --run-id bugfixing-java)
          echo "$artifacts" | jq .
          patch_dir=$(echo "$artifacts" | jq -r '.crs | to_entries[0].value.patch // empty')
          if [ -n "$patch_dir" ] && [ -d "$patch_dir" ] && [ -n "$(ls -A "$patch_dir" 2>/dev/null)" ]; then
            echo "Found patches:"
            ls -la "$patch_dir"
          else
            echo "WARNING: No patches found (may be expected if LLM could not fix)"
          fi
