name: builder-sidecar-full
type:
  - bug-fixing
version: 1.0.0
docker_registry: local

target_build_phase:
  - name: default-build
    dockerfile: oss-crs/builder.Dockerfile
    outputs:
      - build
      - src
  - name: coverage-build
    dockerfile: oss-crs/coverage-builder.Dockerfile
    outputs:
      - coverage-build
      - coverage-src

crs_run_phase:
  patcher:
    dockerfile: oss-crs/patcher.Dockerfile

supported_target:
  mode:
    - full
    - delta
  language:
    - c
    - c++
  sanitizer:
    - address
  architecture:
    - x86_64
